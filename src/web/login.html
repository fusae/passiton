<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passiton Login</title>
  <link rel="stylesheet" href="/cloud.css" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-brand">
        <div class="auth-logo">
          <span class="dot green"></span>
          <h1>Passiton</h1>
        </div>
        <p>Local-first multi-agent orchestration</p>
      </div>

      <p class="auth-link" style="text-align: center; margin-bottom: 18px;">Sign in with your existing local account.</p>

      <form id="login-form" class="auth-form" data-auth-form="login">
        <div class="form-row">
          <label>Email</label>
          <input name="email" type="email" autocomplete="email" required />
        </div>
        <div class="form-row">
          <label>Password</label>
          <input name="password" type="password" autocomplete="current-password" minlength="8" required />
        </div>
        <button class="modal-submit auth-submit" type="submit">Login</button>
        <a id="forgot-password-link" class="auth-link" href="#">Forgot password?</a>
      </form>
      <button id="local-login-button" class="modal-submit auth-submit" type="button" style="margin-top: 12px;">Continue as Local User</button>

    </section>
  </main>

  <div id="toast-container"></div>

  <script>
    const TOKEN_KEY = 'turing-jwt'
    const API_BASE = window.location.protocol === 'file:' ? 'http://127.0.0.1:4590' : ''
    if (window.location.protocol === 'file:') {
      window.location.href = `${API_BASE}/login.html`
    }
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/

    function showToast(message, type = 'error') {
      const container = document.getElementById('toast-container')
      const toast = document.createElement('div')
      toast.className = `toast toast-${type}`
      toast.textContent = message
      container.appendChild(toast)
      setTimeout(() => toast.classList.add('show'), 10)
      setTimeout(() => {
        toast.classList.remove('show')
        setTimeout(() => toast.remove(), 300)
      }, 3000)
    }

    function validateAuthForm(form, mode) {
      const fd = new FormData(form)
      const email = String(fd.get('email') || '').trim()
      const password = String(fd.get('password') || '')
      if (!emailRe.test(email)) throw new Error('Enter a valid email address')
      if (password.length < 8) throw new Error('Password must be at least 8 characters')
      return { email, password }
    }

    async function submitAuth(event) {
      event.preventDefault()
      const form = event.target
      const mode = form.dataset.authForm
      const btn = form.querySelector('button[type="submit"]')
      const originalText = btn.textContent
      try {
        const body = validateAuthForm(form, mode)
        btn.disabled = true
        btn.textContent = 'Logging in...'
        const res = await fetch(`${API_BASE}/api/auth/${mode}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        })
        const data = await res.json().catch(() => null)
        if (!res.ok) throw new Error(data?.error || `HTTP ${res.status}`)
        localStorage.setItem(TOKEN_KEY, data.token)
        window.location.href = API_BASE ? `${API_BASE}/sessions` : '/sessions'
      } catch (err) {
        showToast(err.message || 'Authentication failed', 'error')
      } finally {
        btn.disabled = false
        btn.textContent = originalText
      }
    }

    document.querySelectorAll('.auth-form').forEach((form) => form.addEventListener('submit', submitAuth))
    async function localLogin() {
      const btn = document.getElementById('local-login-button')
      const originalText = btn.textContent
      try {
        btn.disabled = true
        btn.textContent = 'Continuing...'
        const res = await fetch(`${API_BASE}/api/auth/local`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}',
        })
        const data = await res.json().catch(() => null)
        if (!res.ok) throw new Error(data?.error || `HTTP ${res.status}`)
        localStorage.setItem(TOKEN_KEY, data.token)
        window.location.href = API_BASE ? `${API_BASE}/sessions` : '/sessions'
      } catch (err) {
        showToast(err.message || 'Local login failed', 'error')
      } finally {
        btn.disabled = false
        btn.textContent = originalText
      }
    }

    document.getElementById('local-login-button').addEventListener('click', localLogin)
    setTimeout(localLogin, 0)
    document.getElementById('forgot-password-link').addEventListener('click', (event) => {
      event.preventDefault()
      showToast('Password reset is not configured yet', 'info')
    })
  </script>
</body>
</html>
