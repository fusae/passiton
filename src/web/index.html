<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turing Cloud — Assistant Workflow Platform</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* Task cards grid */
    .session-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }
    .session-card { cursor: pointer; }
    .session-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .session-card-title {
      font-weight: 600;
      font-size: 0.95rem;
    }
    .session-card-route {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    .session-card-route .route-arrow {
      color: var(--accent);
      font-weight: 600;
    }
    .session-card-meta {
      display: flex;
      gap: 20px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .session-card-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Workflow cards */
    .pipeline-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 20px;
    }
    .pipeline-card { cursor: pointer; }
    .pipeline-steps {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .pipeline-step {
      padding: 4px 12px;
      border-radius: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .pipeline-step-arrow {
      color: var(--text-muted);
      font-size: 0.7rem;
    }

    .view-toggle {
      display: flex;
      gap: 4px;
    }
    .view-toggle button {
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
      background: transparent;
    }
    .view-toggle button.active {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
    }
    .view-toggle button:not(.active) {
      border: 1px solid transparent;
    }
    .view-toggle button:hover:not(.active) {
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="/app.js"></script>
</body>
</html>
