<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turing</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
</head>
<body>
  <header>
    <div class="header-left">
      <button id="mobile-menu-btn">☰</button>
      <div class="dot" id="server-dot"></div>
      <h1>Turing</h1>
      <span class="header-sub">agent-to-agent proxy</span>
    </div>
    <div class="header-right">
      <button id="log-toggle" title="Toggle execution logs">
        📋 <span>Logs</span>
        <span id="log-error-dot" class="log-error-dot hidden"></span>
      </button>
      <button id="settings-toggle" title="Settings">⚙ <span>Settings</span></button>
      <span id="ws-status" class="ws-badge">connecting…</span>
    </div>
  </header>

  <div id="app">
    <div id="mobile-overlay"></div>
    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <span>Sessions</span>
        <button id="new-btn">+ New</button>
      </div>

      <div id="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="paused">Paused</button>
        <button class="filter-btn" data-filter="done">Done</button>
      </div>

      <div id="session-list"></div>

      <div id="agents-panel">
        <div class="agents-panel-header">
          <span>Agents</span>
          <button id="refresh-agents-btn" class="icon-btn" title="Refresh">↻</button>
        </div>
        <div class="agents-list"></div>
      </div>
    </aside>

    <!-- Main content -->
    <main id="main">
      <div id="empty-state" class="hidden">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"></rect>
          <path d="M9 9h6M9 15h6"></path>
        </svg>
        <p>Select a session or create a new one</p>
      </div>
      <div id="session-view" class="hidden">
        <div id="session-toolbar">
          <div class="toolbar-left">
            <span id="session-title" class="title"></span>
            <span id="session-badge" class="badge"></span>
            <span id="session-rounds" class="rounds-label"></span>
          </div>
          <div class="toolbar-right">
            <button id="btn-export" class="toolbar-btn">⇩ Export</button>
            <button id="btn-pause"  class="toolbar-btn">⏸ Pause</button>
            <button id="btn-resume" class="toolbar-btn hidden">▶ Resume</button>
            <button id="btn-stop"   class="toolbar-btn danger hidden">⏹ Stop</button>
          </div>
        </div>

        <!-- Max-rounds banner (shown when session is paused due to round limit) -->
        <div id="rounds-banner" class="hidden">
          <span id="rounds-banner-msg">⚠ Session reached max rounds</span>
          <div class="rounds-banner-actions">
            <button id="btn-continue-10" class="banner-btn">Continue +10 rounds</button>
            <button id="btn-continue-custom" class="banner-btn">Continue +N…</button>
            <button id="btn-end-session" class="banner-btn danger">End session</button>
          </div>
        </div>

        <div id="messages"></div>

        <button id="scroll-to-bottom" class="hidden" title="Scroll to bottom">
          ↓ New messages
        </button>

        <div id="inject-bar">
          <div id="inject-side-selector">
            <span class="inject-label">Send as:</span>
            <span class="side-chip active" id="inject-human-chip">human</span>
          </div>
          <div id="inject-input-row">
            <textarea id="inject-input" rows="2" placeholder="Inject a message… (⌘+Enter to send)"></textarea>
            <button id="inject-btn">Send</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- New Session Modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div class="modal-header">
        <h2>New Session</h2>
        <button id="modal-close" class="modal-close-btn">✕</button>
      </div>
      <form id="modal-form">
        <div class="form-row">
          <label>Templates <span class="hint">(Quick fill)</span></label>
          <div id="template-selector" class="template-selector"></div>
        </div>
        <div class="form-row">
          <label>From <span class="hint">(initiator)</span></label>
          <select name="from" id="from-select"></select>
        </div>
        <div class="form-row">
          <label>To <span class="hint">(executor)</span></label>
          <select name="to" id="to-select"></select>
        </div>
        <div class="form-row">
          <label>Mode</label>
          <select name="mode" id="mode-select">
            <option value="collaborate">Collaborate — plan + execute</option>
            <option value="discuss">Discuss — open debate</option>
            <option value="review">Review — submit + critique</option>
            <option value="freeform">Freeform — no preset roles</option>
          </select>
        </div>
        <div class="form-row">
          <label>Initial prompt</label>
          <textarea name="prompt" id="modal-prompt" required placeholder="Describe the task…"></textarea>
        </div>
        <div class="form-row">
          <label>Context <span class="hint">(optional — injected every round)</span></label>
          <details class="context-details">
            <summary>Expand to add context</summary>
            <div class="context-fields">
              <div class="context-field">
                <label>Rules / Constraints</label>
                <textarea name="contextRules" id="modal-context-rules" rows="2" placeholder="e.g. vanilla JS, dark theme, no frameworks"></textarea>
              </div>
              <div class="context-field">
                <label>Background Text</label>
                <textarea name="contextText" id="modal-context-text" rows="2" placeholder="e.g. We discussed using Xray + VLESS for VPN setup…"></textarea>
              </div>
              <div class="context-field">
                <label>File Paths <span class="hint">(comma-separated or one per line)</span></label>
                <textarea name="contextFiles" id="modal-context-files" rows="3" placeholder="src/web/app.js, src/web/style.css"></textarea>
              </div>
            </div>
          </details>
        </div>
        <div class="form-row-inline">
          <div class="form-row half">
            <label>Max rounds</label>
            <input name="maxRounds" type="number" min="1" max="200" placeholder="20" />
          </div>
          <div class="form-row half">
            <label>Working directory <span class="hint">(optional)</span></label>
            <input name="cwd" type="text" placeholder="~/Projects/my-app" />
          </div>
        </div>
        <div class="form-row form-row-check">
          <input name="approveMode" type="checkbox" id="approve-mode" />
          <label for="approve-mode">Approve mode — pause before each round</label>
        </div>
        <div class="modal-actions">
          <button type="button" class="modal-cancel" id="modal-cancel">Cancel</button>
          <button type="submit" class="modal-submit">Create Session</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Resume +N modal -->
  <div id="resume-modal-overlay" class="hidden">
    <div id="resume-modal">
      <h2>Continue session</h2>
      <div class="form-row">
        <label>Add how many rounds?</label>
        <input id="resume-rounds-input" type="number" min="1" max="200" value="10" />
      </div>
      <div class="modal-actions">
        <button id="resume-modal-cancel" class="modal-cancel">Cancel</button>
        <button id="resume-modal-ok" class="modal-submit">Continue</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Log Panel -->
  <div id="log-panel" class="hidden">
    <div id="log-panel-header">
      <span class="log-panel-title">Execution Logs</span>
      <div class="log-panel-actions">
        <button id="log-clear-btn" class="log-action-btn" title="Clear logs">Clear</button>
        <button id="log-close-btn" class="log-action-btn" title="Close">✕</button>
      </div>
    </div>
    <div id="log-panel-resize" title="Drag to resize"></div>
    <div id="log-entries"></div>
  </div>

  <!-- Settings Panel -->
  <div id="settings-panel" class="hidden">
    <div class="settings-overlay"></div>
    <div class="settings-content">
      <div class="settings-header">
        <h2>Settings</h2>
        <button id="settings-close" class="modal-close-btn">✕</button>
      </div>

      <div class="settings-body">
        <!-- Agent Management Section -->
        <section class="settings-section">
          <h3>Agent Management</h3>
          <div id="agents-config-list"></div>
          <div id="agent-config-form-slot"></div>
          <button id="add-agent-btn" class="settings-btn">+ Add Agent</button>
        </section>

        <!-- Global Settings Section -->
        <section class="settings-section">
          <h3>Global Settings</h3>
          <div class="form-row">
            <label>Default Max Rounds</label>
            <input id="global-max-rounds" type="number" min="1" max="500" />
          </div>
          <div class="form-row">
            <label>Server Port <span class="hint">(requires restart)</span></label>
            <input id="global-port" type="number" min="1024" max="65535" />
          </div>
          <div class="form-row">
            <label>Default Mode</label>
            <select id="global-mode">
              <option value="collaborate">Collaborate</option>
              <option value="discuss">Discuss</option>
              <option value="review">Review</option>
              <option value="freeform">Freeform</option>
            </select>
          </div>
          <button id="save-global-settings-btn" class="settings-btn primary">Save Global Settings</button>
        </section>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
