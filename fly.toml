app = "passiton"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "4590"
  PASSITON_HOST = "0.0.0.0"
  PASSITON_LOCAL_CLI_AGENTS = "false"
  PASSITON_LOCAL_ACCESS = "false"
  PASSITON_ALLOWED_WORKSPACES = "/app/data"
  # Set PASSITON_JWT_SECRET with `fly secrets set`; do not store it here.

[http_service]
  internal_port = 4590
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[mounts]]
  source = "passiton_data"
  destination = "/app/data"
