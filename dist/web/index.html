<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turing</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="dot"></div>
    <h1>Turing</h1>
    <span style="color:var(--muted);font-size:12px">agent-to-agent proxy</span>
  </header>

  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <span>Sessions</span>
        <button id="new-btn">+ New</button>
      </div>
      <div id="session-list"></div>

      <div id="agents-panel">
        <h2>Agents</h2>
        <div class="agents-list"></div>
      </div>
    </aside>

    <!-- Main content -->
    <main id="main">
      <div id="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/>
        </svg>
        <p>Select a session or create a new one</p>
      </div>

      <div id="session-view" class="hidden" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
        <div id="session-toolbar">
          <span id="session-title" class="title"></span>
          <span id="session-badge" class="badge"></span>
          <button id="btn-pause"  class="toolbar-btn">Pause</button>
          <button id="btn-resume" class="toolbar-btn" style="display:none">Resume</button>
          <button id="btn-stop"   class="toolbar-btn danger">Stop</button>
        </div>
        <div id="messages"></div>
        <div id="inject-bar">
          <textarea id="inject-input" rows="2" placeholder="Inject a message (⌘+Enter to send)…"></textarea>
          <button id="inject-btn">Send</button>
        </div>
      </div>
    </main>
  </div>

  <!-- New Session Modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <h2>New Session</h2>
      <form id="modal-form">
        <div class="form-row">
          <label>From (initiator)</label>
          <select name="from" id="from-select"></select>
        </div>
        <div class="form-row">
          <label>To (executor)</label>
          <select name="to" id="to-select"></select>
        </div>
        <div class="form-row">
          <label>Initial prompt</label>
          <textarea name="prompt" required placeholder="Describe the task…"></textarea>
        </div>
        <div class="form-row">
          <label>Max rounds (default 20)</label>
          <input name="maxRounds" type="number" min="1" max="100" placeholder="20" />
        </div>
        <div class="form-row">
          <label>Working directory (optional)</label>
          <input name="cwd" type="text" placeholder="/Users/you/Projects/my-app" />
        </div>
        <div class="form-row" style="display:flex;align-items:center;gap:8px;">
          <input name="approveMode" type="checkbox" id="approve-mode" style="width:auto" />
          <label for="approve-mode" style="margin:0;color:var(--text)">Approve mode (pause before each round)</label>
        </div>
        <div class="modal-actions">
          <button type="button" class="modal-cancel" id="modal-cancel">Cancel</button>
          <button type="submit" class="modal-submit">Create</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
