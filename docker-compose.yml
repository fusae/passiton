services:
  passiton:
    build: .
    environment:
      PASSITON_HOST: 0.0.0.0
      PASSITON_LOCAL_ACCESS: "false"
      PASSITON_JWT_SECRET: ${PASSITON_JWT_SECRET:?set a strong PASSITON_JWT_SECRET}
      PASSITON_ENCRYPTION_KEY: ${PASSITON_ENCRYPTION_KEY:?set a strong PASSITON_ENCRYPTION_KEY}
      PASSITON_ALLOWED_WORKSPACES: /app/workspaces
      PORT: 4590
    volumes:
      - ./data:/app/data
      - ./workspaces:/app/workspaces
    ports:
      - "127.0.0.1:${PORT:-4590}:4590"
